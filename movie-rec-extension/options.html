<!DOCTYPE html> <!-- HTML5 doctype -->
<html lang="en"> <!-- Document language English -->
  <head> <!-- Head: title and CSS only -->
    <meta charset="UTF-8" /> <!-- UTF-8 for special characters in copy/paste -->
    <title>Movie Engine — Settings</title> <!-- Tab title for options page -->
    <link rel="stylesheet" href="options.css" /> <!-- Styles the settings form -->
  </head> <!-- End head -->
  <body> <!-- Visible options UI -->
    <main class="panel"> <!-- Constrains width and groups content -->
      <h1>Settings</h1> <!-- Page heading -->
      <p class="hint"> <!-- Help text with external link -->
        Get a free key at
        <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">themoviedb.org/settings/api</a>.
        It stays on this device only.
      </p> <!-- End hint -->
      <label for="apiKey">TMDB API key</label> <!-- Associates with input#apiKey -->
      <input id="apiKey" type="password" autocomplete="off" placeholder="Paste your v3 API key" /> <!-- Masks key; options.js reads/writes -->

      <div class="spacer" style="margin-top: 20px;"></div>

      <p class="hint">
        Get a free Gemini AI key at
        <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">aistudio.google.com</a>.
      </p>
      <label for="geminiKey">Gemini AI key</label>
      <input id="geminiKey" type="password" autocomplete="off" placeholder="Paste your Gemini API key" />

      <div id="modelSection" class="hidden">
        <label for="modelSelect">Gemini Model</label>
        <select id="modelSelect"></select>
        <p id="modelDesc" class="hint" style="font-size: 0.75rem; margin-top: 4px;"></p>
      </div>

      <div class="row"> <!-- Horizontal row: Save + status -->
        <button type="button" id="save">Save</button> <!-- Persists key to chrome.storage.local -->
        <span id="status" class="status" aria-live="polite"></span> <!-- "Saved." feedback -->
      </div> <!-- End row -->
    </main> <!-- End main -->
    <script src="options.js"></script> <!-- Save handler and initial load -->
  </body> <!-- End body -->
</html> <!-- End html -->
